[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for different test types
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (still no DAZ required)
    contract: Contract/interface tests
    command: Individual command tests
    e2e: End-to-end tests (require DAZ Studio)
    manual: Manual tests (documentation only)
    slow: Tests that take significant time

# Don't run e2e and manual tests by default
addopts = -v --tb=short -m "not e2e and not manual"

# Test discovery patterns
norecursedirs = .git .tox dist build *.egg

# Coverage options (when using --cov)
[coverage:run]
source = core, vangard
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
